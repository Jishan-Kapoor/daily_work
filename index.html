<body class="antialiased min-h-screen flex flex-col">
    <div id="app" class="flex-grow flex flex-col w-full h-full">
        <!-- Initial Loader -->
        <div class="flex-grow flex items-center justify-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
        </div>
    </div>

    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseUrl = 'https://qncndyybqqssksyzgbhb.supabase.co';
        const supabaseKey = 'sb_publishable_iW4u2LAvXS-NV7YOhHuk7w_DRBW0aih';
        
        // Dummy storage object to guarantee localStorage is NEVER touched for Auth
        const dummyStorage = {
            getItem: () => null,
            setItem: () => {},
            removeItem: () => {}
        };

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey, {
            auth: {
                persistSession: false,
                storage: dummyStorage 
            }
        });

        window.state = {
            currentUser: null,
            users: [],
            tasks: [],
            loading: true,
            currentView: '' // 'login', 'admin', 'user'
        };

        const appContainer = document.getElementById('app');

        function setHTML(el, html) {
            if (!el) return;
            if (el.innerHTML !== html) {
                el.innerHTML = html;
            }
        }

        async function loadData() {
            try {
                // Fetch Users
                const { data: usersData, error: usersErr } = await supabaseClient.from('users').select('*');
                if (usersErr) throw usersErr;
                
                window.state.users = usersData || [];

                // Initialize default admin if DB users table is completely empty
                if (window.state.users.length === 0) {
                    const defaultAdmin = { id: 'admin-id', username: 'admin', password: 'admin123', role: 'admin' };
                    await supabaseClient.from('users').insert([defaultAdmin]);
                    window.state.users.push(defaultAdmin);
                }

                // Check for persisted login to prevent login screen flicker on refresh
                const savedUserId = localStorage.getItem('dw_user_id');
                if (savedUserId) {
                    const u = window.state.users.find(x => x.id === savedUserId);
                    if (u) window.state.currentUser = u;
                }

                // Fetch Tasks
                const { data: tasksData, error: tasksErr } = await supabaseClient.from('tasks').select('*');
                if (tasksErr) throw tasksErr;
                
                window.state.tasks = tasksData || [];

                setupRealtimeListeners();
                finishLoading();

            } catch (err) {
                console.error("Supabase load error:", err);
                finishLoading();
            }
        }

        function setupRealtimeListeners() {
            supabaseClient
                .channel('public-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, async () => {
                    const { data } = await supabaseClient.from('users').select('*');
                    if (data) {
                        window.state.users = data;
                        route();
                    }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, async () => {
                    const { data } = await supabaseClient.from('tasks').select('*');
                    if (data) {
                        window.state.tasks = data;
                        route();
                    }
                })
                .subscribe();
        }

        function finishLoading() {
            if (window.state.loading) {
                window.state.loading = false;
                route();
            }
        }

        window.dbActions = {
            async addUser(userObj) {
                window.state.users.push(userObj);
                route(); 
                await supabaseClient.from('users').insert([userObj]);
            },
            async updatePassword(userId, newPassword) {
                const u = window.state.users.find(u => u.id === userId);
                if(u) u.password = newPassword;
                route(); 
                await supabaseClient.from('users').update({ password: newPassword }).eq('id', userId);
            },
            async deleteUser(userId) {
                window.state.tasks = window.state.tasks.filter(t => t.assigneeId !== userId);
                window.state.users = window.state.users.filter(u => u.id !== userId);
                route(); 
                await supabaseClient.from('tasks').delete().eq('assigneeId', userId);
                await supabaseClient.from('users').delete().eq('id', userId);
            },
            async addTask(taskObj) {
                window.state.tasks.push(taskObj);
                route(); 
                await supabaseClient.from('tasks').insert([taskObj]);
            },
            async updateTask(taskObj) {
                const idx = window.state.tasks.findIndex(t => t.id === taskObj.id);
                if (idx > -1) window.state.tasks[idx] = taskObj;
                route(); 
                await supabaseClient.from('tasks').update(taskObj).eq('id', taskObj.id);
            },
            async deleteTask(taskId) {
                window.state.tasks = window.state.tasks.filter(t => t.id !== taskId);
                route(); 
                await supabaseClient.from('tasks').delete().eq('id', taskId);
            }
        };

        const getLocalYYYYMMDD = (d) => {
            const offset = d.getTimezoneOffset() * 60000;
            return (new Date(d.getTime() - offset)).toISOString().split('T')[0];
        };

        const getTodayString = () => getLocalYYYYMMDD(new Date());
        
        const formatDate = (isoString) => {
            const d = new Date(isoString);
            return `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        };
        
        // This function intelligently detects if a task was completed inside its assigned window (Daily, Weekly, Monthly)
        const isTaskCompletedCurrentPeriod = (task) => {
            if (task.type === 'temporary') return task.completed;
            
            const completedDates = task.completedDates || [];
            if (completedDates.length === 0) return false;

            const today = new Date();
            const todayStr = getLocalYYYYMMDD(today);

            if (task.type === 'daily') {
                return completedDates.includes(todayStr);
            }
            
            if (task.type === 'weekly') {
                // Define start of current week (Monday)
                const day = today.getDay(); // 0 is Sunday
                const diffToMonday = day === 0 ? -6 : 1 - day;
                const startOfWeek = new Date(today);
                startOfWeek.setDate(today.getDate() + diffToMonday);
                const startStr = getLocalYYYYMMDD(startOfWeek);
                
                // If there's any completion record between Monday and Today, it's done for the week
                return completedDates.some(d => d >= startStr && d <= todayStr);
            }
            
            if (task.type === 'monthly') {
                // Define start of current month
                const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
                const startStr = getLocalYYYYMMDD(startOfMonth);
                
                // If there's any completion record this month, it's done
                return completedDates.some(d => d >= startStr && d <= todayStr);
            }

            return false;
        };
        
        const getAssigneeName = (userId) => {
            const user = window.state.users.find(u => u.id === userId);
            return user ? user.username : 'Unknown';
        };

        window.route = function() {
            if (window.state.loading) return;
            if (!window.state.currentUser) {
                if (window.state.currentView !== 'login') {
                    appContainer.innerHTML = buildLogin();
                    window.state.currentView = 'login';
                }
                return;
            }
            if (window.state.currentUser.role === 'admin') {
                if (window.state.currentView !== 'admin') {
                    appContainer.innerHTML = buildAdminLayout();
                    window.state.currentView = 'admin';
                }
                updateAdminLists(); 
                return;
            }
            if (window.state.currentView !== 'user') {
                appContainer.innerHTML = buildUserLayout();
                window.state.currentView = 'user';
            }
            updateUserLists();
        };

        function getSvgEye() { return `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" class="icon-eye"></path></svg>`; }
        function getSvgEyeSlash() { return `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" class="icon-eye-slash"></path></svg>`; }
        function getSvgUser() { return `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" class="icon-user"></path></svg>`; }

        function buildLogin() {
            return `
            <div class="flex-grow flex items-center justify-center p-4 fade-in">

                        <div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center shadow-sm mb-4">

                        </div>
                        <h1 class="text-xl font-bold text-slate-800">Daily Work</h1>
                        <p class="text-sm text-slate-500 mt-1">Sign in to your workspace</p>
                    </div>
                    <div class="p-6">
                        <form id="login-form" class="space-y-4">

                                    <input type="text" id="login-username" required class="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">

                                    <button type="button" class="toggle-password absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 focus:outline-none" title="Toggle visibility">
                                        ${getSvgEye()}
                                    </button>
                                </div>
                            </div>
                            <div id="login-error" class="hidden text-red-600 text-sm font-medium bg-red-50 p-2 rounded border border-red-100 text-center">Invalid credentials.</div>

                                Continue to Workspace
                            </button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        function buildNavbar() {
            return `
            <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-20 shadow-sm">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded flex items-center justify-center shadow-sm">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h1 class="text-lg font-bold text-slate-800 tracking-tight">Daily Work</h1>

                        <span class="text-sm font-medium text-slate-700">

        }

        function buildAdminLayout() {
            return `

                <div class="space-y-6 lg:col-span-1">

                                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                Team Management

                        <div class="p-4 border-b border-slate-100">
                            <form id="create-user-form" class="space-y-3">

                                <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium py-2 rounded transition-colors shadow-sm">Create User</button>

                        </div>
                        <div id="admin-user-list" class="max-h-60 overflow-y-auto bg-slate-50"></div>
                    </div>
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">

                                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>

        function buildUserLayout() {
            return `
            ${buildNavbar()}
            <main class="flex-grow p-4 sm:p-6 max-w-7xl mx-auto w-full fade-in flex flex-col gap-6">
                
                <!-- Create Personal Task -->
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 z-10 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-8 opacity-5 pointer-events-none">
                         <svg class="w-32 h-32" fill="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="relative z-10">
                        <h2 class="text-sm font-semibold text-slate-800 mb-3 flex items-center gap-2">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>

                        </h2>
                        <form id="create-personal-task-form" class="flex flex-col md:flex-row gap-3 items-end md:items-center">

                                <label class="text-[10px] uppercase font-bold text-slate-500 mb-1 block">Frequency</label>
                                <select id="personal-task-type" class="w-full px-3 py-2 text-sm rounded border border-slate-300 focus:ring-1 focus:ring-primary outline-none bg-white">

                                    <option value="daily">Daily Routine</option>
                                    <option value="weekly">Weekly Routine</option>
                                    <option value="monthly">Monthly Routine</option>
                                </select>
                            </div>
                            <div class="flex-grow w-full md:w-auto">
                                <label class="text-[10px] uppercase font-bold text-slate-500 mb-1 block">Note (Optional)</label>
                                <input type="text" id="personal-task-initial-comment" placeholder="Add a note" class="w-full px-3 py-2 text-sm rounded border border-slate-300 focus:ring-1 focus:ring-primary outline-none">
                            </div>

                                <button type="submit" class="w-full md:w-auto px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium rounded transition-colors shadow-sm whitespace-nowrap">

                        </form>
                    </div>
                </div>

                <!-- Lists Layout: Routines vs One-Time -->

                    <!-- Recurring Routines Group -->

                            <div id="section-weekly">
                                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex justify-between items-center">
                                    Weekly <span class="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-medium normal-case tracking-normal">Resets Monday</span>
                                </h3>
                                <div id="user-weekly-tasks" class="space-y-3"></div>
                            </div>
                            
                            <!-- Monthly Section -->
                            <div id="section-monthly">
                                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex justify-between items-center">
                                    Monthly <span class="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-medium normal-case tracking-normal">Resets on the 1st</span>
                                </h3>
                                <div id="user-monthly-tasks" class="space-y-3"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- One-Time Tasks Column -->
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div class="border-b border-slate-100 bg-slate-50 p-4">
                            <h2 class="text-base font-semibold text-slate-800 flex items-center gap-2">
                                <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                One-time Tasks
                            </h2>
                        </div>
                        <div id="user-temp-tasks" class="p-4 sm:p-6 space-y-4 bg-slate-50/50 min-h-[200px]"></div>
                    </div>
                </div>
            </main>`;
        }

        function updateAdminLists() {
            const userListEl = document.getElementById('admin-user-list');
            const taskListEl = document.getElementById('admin-task-list');
            const assigneeContainer = document.getElementById('assignee-select-container');
            if (!userListEl || !taskListEl) return;

            const standardUsers = window.state.users.filter(u => u.role === 'user');

            const newUserListHtml = standardUsers.map(u => `
                <div class="flex items-center justify-between p-3 border-b border-slate-100 last:border-0 hover:bg-slate-100 transition-colors group">
                    <span class="font-medium text-sm text-slate-700 flex items-center gap-2">
                        <span class="text-slate-400">${getSvgUser()}</span>
                        ${u.username}
                    </span>
                    <div class="flex items-center gap-2">
                        <div class="relative w-28">
                            <input type="password" data-action="edit-password" data-id="${u.id}" value="${u.password}" class="w-full pl-2 pr-6 py-1 text-xs border border-slate-300 rounded focus:ring-1 focus:ring-primary outline-none" title="Change password (auto-saves on click away)">
                            <button type="button" class="toggle-password absolute right-1.5 top-1 text-slate-400 hover:text-slate-600 focus:outline-none">${getSvgEye()}</button>
                        </div>
                        <button type="button" data-action="delete-user" data-id="${u.id}" class="text-slate-400 hover:text-red-500 p-1 rounded hover:bg-red-50 transition-colors" title="Delete User">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('') || '<div class="p-4 text-sm text-slate-500 text-center italic">No standard users added yet.</div>';
            
            setHTML(userListEl, newUserListHtml);

            if (assigneeContainer) {
                let assigneeHtml = '';
                if (standardUsers.length === 0) {
                    assigneeHtml = `<div class="text-xs text-amber-600 bg-amber-50 p-2 rounded border border-amber-200">Create a user first to assign tasks.</div>`;
                    document.getElementById('submit-task-btn').disabled = true;
                    document.getElementById('submit-task-btn').classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    assigneeHtml = `
                        <select id="task-assignee" required class="w-full px-3 py-2 text-sm rounded border border-slate-300 focus:ring-1 focus:ring-primary outline-none bg-white">
                            ${standardUsers.map(u => `<option value="${u.id}">${u.username}</option>`).join('')}
                        </select>
                    `;
                    document.getElementById('submit-task-btn').disabled = false;
                    document.getElementById('submit-task-btn').classList.remove('opacity-50', 'cursor-not-allowed');
                }
                setHTML(assigneeContainer, assigneeHtml);
            }

            const sortedTasks = [...window.state.tasks].sort((a,b) => b.id.localeCompare(a.id));
            const newTaskListHtml = sortedTasks.length === 0 
                ? `<div class="flex flex-col items-center justify-center py-12 text-slate-400"><p class="text-sm">Workspace is empty.</p></div>` 
                : sortedTasks.map(t => renderTaskCard(t, true)).join('');
            
            setHTML(taskListEl, newTaskListHtml);
        }

        function updateUserLists() {
            const dailyEl = document.getElementById('user-daily-tasks');
            const weeklyEl = document.getElementById('user-weekly-tasks');
            const monthlyEl = document.getElementById('user-monthly-tasks');
            const tempEl = document.getElementById('user-temp-tasks');
            if (!dailyEl || !weeklyEl || !monthlyEl || !tempEl) return;

            const userTasks = window.state.tasks.filter(t => t.assigneeId === window.state.currentUser.id);
            
            const dailyTasks = userTasks.filter(t => t.type === 'daily').sort((a,b) => b.id.localeCompare(a.id));
            const weeklyTasks = userTasks.filter(t => t.type === 'weekly').sort((a,b) => b.id.localeCompare(a.id));
            const monthlyTasks = userTasks.filter(t => t.type === 'monthly').sort((a,b) => b.id.localeCompare(a.id));
            const tempTasks = userTasks.filter(t => t.type === 'temporary').sort((a,b) => b.id.localeCompare(a.id));

            setHTML(dailyEl, dailyTasks.length === 0 ? `<p class="text-xs text-slate-400 italic py-2">No daily routines.</p>` : dailyTasks.map(t => renderTaskCard(t)).join(''));
            setHTML(weeklyEl, weeklyTasks.length === 0 ? `<p class="text-xs text-slate-400 italic py-2">No weekly routines.</p>` : weeklyTasks.map(t => renderTaskCard(t)).join(''));
            setHTML(monthlyEl, monthlyTasks.length === 0 ? `<p class="text-xs text-slate-400 italic py-2">No monthly routines.</p>` : monthlyTasks.map(t => renderTaskCard(t)).join(''));
            setHTML(tempEl, tempTasks.length === 0 ? `<p class="text-sm text-slate-400 italic text-center py-6">No specific tasks pending.</p>` : tempTasks.map(t => renderTaskCard(t)).join(''));
        }

        function renderTaskCard(task, isAdminView = false) {
            const completed = isTaskCompletedCurrentPeriod(task);
            const statusClass = completed ? "bg-white border-slate-200 opacity-60" : "bg-white border-slate-300 shadow-sm";
            const textClass = completed ? "text-slate-500 line-through" : "text-slate-800";
            const canDelete = window.state.currentUser.role === 'admin' || task.createdBy === window.state.currentUser.id;

            const sortedComments = [...(task.comments || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
            const commentsHtml = sortedComments.map(c => `
                <div class="text-xs py-2 border-b border-slate-100 last:border-0 ${c.isLog ? 'bg-slate-100 -mx-2 px-2 rounded my-1' : ''}">
                    <div class="flex justify-between items-baseline mb-0.5">
                        <span class="font-semibold text-slate-700 flex items-center gap-1.5">
                            ${c.author}
                            ${c.isLog ? `<span class="bg-slate-200 text-slate-600 text-[9px] uppercase font-bold px-1 py-0.5 rounded border border-slate-300">Log: ${c.logDate}</span>` : ''}
                        </span>
                        <span class="text-slate-400 text-[10px] whitespace-nowrap ml-2">${formatDate(c.date)}</span>
                    </div>
                    <p class="text-slate-600 leading-relaxed">${c.text}</p>
                </div>
            `).join('');

            const checkboxHtml = !isAdminView ? `
                <div class="pt-0.5 flex-shrink-0">
                    <button data-action="toggle-task" data-id="${task.id}" class="w-5 h-5 rounded border focus:ring-2 focus:ring-primary transition-colors flex items-center justify-center cursor-pointer ${completed ? 'bg-primary border-primary text-white hover:bg-primary-hover hover:border-primary-hover shadow-inner' : 'bg-white border-slate-400 hover:border-primary shadow-sm'}">${completed ? '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}</button>
                </div>
            ` : '';

            // Generating appropriate frequency badge
            let freqBadgeHtml = '';
            if (task.type === 'daily') freqBadgeHtml = `<span class="text-[10px] text-primary bg-primary-light px-1.5 py-0.5 rounded border border-primary-border">Daily</span>`;
            if (task.type === 'weekly') freqBadgeHtml = `<span class="text-[10px] text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-200">Weekly</span>`;
            if (task.type === 'monthly') freqBadgeHtml = `<span class="text-[10px] text-fuchsia-600 bg-fuchsia-50 px-1.5 py-0.5 rounded border border-fuchsia-200">Monthly</span>`;

            return `
            <div class="rounded-lg border ${statusClass} transition-all duration-200 hover:border-slate-400 group overflow-hidden">
                <div class="p-4 flex items-start gap-3">
                    ${checkboxHtml}
                    <div class="flex-grow min-w-0">
                        <div class="flex items-start justify-between gap-4">
                            <div class="truncate">
                                <h3 class="text-sm font-semibold ${textClass} truncate">${task.title}</h3>
                                <div class="flex items-center gap-1.5 mt-1 flex-wrap">
                                    ${isAdminView && completed ? `<span class="text-[10px] uppercase font-bold text-primary bg-primary-light px-1.5 py-0.5 rounded border border-primary-border">Completed</span>` : ''}
                                    ${isAdminView && !completed ? `<span class="text-[10px] uppercase font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded border border-amber-200">Pending</span>` : ''}
                                    ${isAdminView ? `<span class="text-[10px] flex items-center gap-1 text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">${getSvgUser()} ${getAssigneeName(task.assigneeId)}</span>` : ''}
                                    ${task.createdBy === 'admin-id' && !isAdminView ? `<span class="text-[10px] uppercase font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">Assigned by Admin</span>` : ''}
                                    ${task.createdBy === window.state.currentUser.id && !isAdminView ? `<span class="text-[10px] uppercase font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">Personal Task</span>` : ''}
                                    ${freqBadgeHtml}
                                </div>
                            </div>
                            ${canDelete ? `<button data-action="delete-task" data-id="${task.id}" class="text-slate-400 hover:text-red-500 p-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0" title="Delete task"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>` : ''}
                        </div>
                        <div class="mt-3 bg-slate-50 rounded p-3 border border-slate-200 shadow-inner">
                            <div class="max-h-32 overflow-y-auto pr-2 custom-scrollbar">
                                ${commentsHtml || '<p class="text-[11px] text-slate-400 italic">No notes yet.</p>'}
                            </div>
                            <form class="flex gap-2 mt-2" data-action="add-comment" data-id="${task.id}">
                                <input type="text" required placeholder="Add a note..." class="flex-grow px-2.5 py-1.5 text-xs rounded border border-slate-300 focus:ring-1 focus:ring-primary outline-none bg-white shadow-sm">
                                <button type="submit" class="bg-white border border-slate-300 hover:bg-primary-light hover:text-primary-hover text-slate-700 text-xs font-medium px-3 py-1.5 rounded transition-colors shadow-sm">Post</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderLogModal(taskId) {
            const task = window.state.tasks.find(t => t.id === taskId);
            if (!task) return;
            const todayStr = getTodayString();
            
            const typeLabel = task.type.charAt(0).toUpperCase() + task.type.slice(1);
            
            const modalHtml = `
            <div id="log-modal" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-4 fade-in backdrop-blur-sm">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden border border-slate-200">
                    <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 class="font-bold text-slate-800 text-sm">Complete ${typeLabel} Routine</h3>
                        <button id="close-modal" type="button" class="text-slate-400 hover:text-slate-600 transition-colors focus:outline-none"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    </div>
                    <div class="p-5">
                        <p class="text-sm text-slate-600 mb-4">Logging completion for: <br><span class="font-semibold text-slate-800">"${task.title}"</span></p>
                        <form id="log-routine-form" class="space-y-4">
                            <input type="hidden" id="modal-task-id" value="${task.id}">
                            <div>
                                <label class="block text-xs font-medium text-slate-700 mb-1">Date Completed</label>
                                <input type="date" id="modal-date" required value="${todayStr}" max="${todayStr}" class="w-full px-3 py-2 text-sm rounded border border-slate-300 focus:ring-1 focus:ring-primary outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-700 mb-1">Completion Note (Required)</label>
                                <textarea id="modal-note" required placeholder="Briefly describe what was done..." class="w-full px-3 py-2 text-sm rounded border border-slate-300 focus:ring-1 focus:ring-primary outline-none resize-none h-20"></textarea>
                            </div>
                            <div class="pt-2 flex gap-3">
                                <button type="button" id="cancel-modal" class="flex-1 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 text-sm font-medium py-2 rounded transition-colors">Cancel</button>
                                <button type="submit" class="flex-1 bg-primary hover:bg-primary-hover text-white text-sm font-medium py-2 rounded transition-colors shadow-sm">Save Log</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>`;
            const div = document.createElement('div');
            div.innerHTML = modalHtml;
            document.body.appendChild(div.firstElementChild);
        }

        function removeModal() {
            const modal = document.getElementById('log-modal');
            if (modal) modal.remove();
        }

        document.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (e.target.id === 'login-form') {
                const u = document.getElementById('login-username').value.trim();
                const p = document.getElementById('login-password').value.trim();
                const user = window.state.users.find(user => 
                    user.username.toLowerCase() === u.toLowerCase() && 
                    user.password === p
                );
                
                if (user) {
                    window.state.currentUser = user;
                    localStorage.setItem('dw_user_id', user.id); 
                    route();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            }

            if (e.target.id === 'create-user-form') {
                const u = document.getElementById('new-username').value.trim();
                const p = document.getElementById('new-password').value.trim();
                if (window.state.users.some(user => user.username.toLowerCase() === u.toLowerCase())) {
                    alert('Username already exists!');
                    return;
                }
                await window.dbActions.addUser({ id: 'u' + Date.now(), username: u, password: p, role: 'user' });
                e.target.reset(); 
            }

            if (e.target.id === 'create-task-form' || e.target.id === 'create-personal-task-form') {
                const isPersonal = e.target.id === 'create-personal-task-form';
                const title = document.getElementById(isPersonal ? 'personal-task-title' : 'task-title').value.trim();
                const type = document.getElementById(isPersonal ? 'personal-task-type' : 'task-type').value;
                const note = document.getElementById(isPersonal ? 'personal-task-initial-comment' : 'task-initial-comment').value.trim();
                const assigneeId = isPersonal ? window.state.currentUser.id : document.getElementById('task-assignee').value;
                
                const initialComments = [];
                if (note) {
                    initialComments.push({ author: window.state.currentUser.username, text: note, date: new Date().toISOString(), isLog: false });
                }
                await window.dbActions.addTask({
                    id: 't' + Date.now().toString() + Math.random().toString(36).substring(7),
                    title, type, assigneeId, createdBy: window.state.currentUser.id,
                    completed: false, completedDates: [], comments: initialComments
                });
                e.target.reset();
            }

            if (e.target.dataset.action === 'add-comment') {
                const taskId = e.target.dataset.id;
                const text = e.target.querySelector('input').value.trim();
                const task = window.state.tasks.find(t => t.id === taskId);
                if (task && text) {
                    task.comments = task.comments || [];
                    task.comments.push({ author: window.state.currentUser.username, text: text, date: new Date().toISOString(), isLog: false });
                    await window.dbActions.updateTask(task);
                    e.target.reset();
                }
            }

            if (e.target.id === 'log-routine-form') {
                const taskId = document.getElementById('modal-task-id').value;
                const date = document.getElementById('modal-date').value;
                const note = document.getElementById('modal-note').value.trim();
                const task = window.state.tasks.find(t => t.id === taskId);
                
                if (task) {
                    task.completedDates = task.completedDates || [];
                    if (!task.completedDates.includes(date)) task.completedDates.push(date);
                    
                    task.comments = task.comments || [];
                    task.comments.push({ author: window.state.currentUser.username, text: note, date: new Date().toISOString(), isLog: true, logDate: date });
                    
                    await window.dbActions.updateTask(task);
                    removeModal();
                }
            }
        });

        document.addEventListener('change', async (e) => {
            if (e.target.dataset.action === 'edit-password') {
                const newPass = e.target.value.trim();
                if(newPass.length > 0) {
                    await window.dbActions.updatePassword(e.target.dataset.id, newPass);
                }
            }
        });

        document.addEventListener('click', async (e) => {
            const toggleBtn = e.target.closest('.toggle-password');
            if (toggleBtn) {
                const input = toggleBtn.parentElement.querySelector('input');
                if (input.type === 'password') {
                    input.type = 'text';
                    toggleBtn.innerHTML = getSvgEyeSlash();
                } else {
                    input.type = 'password';
                    toggleBtn.innerHTML = getSvgEye();
                }
                return;
            }

            if (e.target.closest('#logout-btn')) {
                window.state.currentUser = null;
                window.state.currentView = '';
                localStorage.removeItem('dw_user_id');
                route();
                return;
            }

            if (e.target.closest('#close-modal') || e.target.closest('#cancel-modal')) {
                removeModal();
                return;
            }

            const toggleTaskBtn = e.target.closest('[data-action="toggle-task"]');
            if (toggleTaskBtn) {
                const task = window.state.tasks.find(t => t.id === toggleTaskBtn.dataset.id);
                if (task) {
                    if (task.type === 'temporary') {
                        task.completed = !task.completed;
                        await window.dbActions.updateTask(task);
                    } else {
                        // For recurring tasks, clicking when it's already complete should un-complete it
                        const isCompleted = isTaskCompletedCurrentPeriod(task);
                        if (isCompleted) {
                            // Find the boundaries of the current period to remove completion logs
                            const today = new Date();
                            let cutoffStr = '';
                            
                            if (task.type === 'daily') {
                                cutoffStr = getLocalYYYYMMDD(today);
                                task.completedDates = (task.completedDates || []).filter(d => d !== cutoffStr);
                            } else if (task.type === 'weekly') {
                                const day = today.getDay();
                                const diffToMonday = day === 0 ? -6 : 1 - day;
                                const startOfWeek = new Date(today);
                                startOfWeek.setDate(today.getDate() + diffToMonday);
                                cutoffStr = getLocalYYYYMMDD(startOfWeek);
                                // Remove any completions >= start of this week
                                task.completedDates = (task.completedDates || []).filter(d => d < cutoffStr);
                            } else if (task.type === 'monthly') {
                                const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
                                cutoffStr = getLocalYYYYMMDD(startOfMonth);
                                // Remove any completions >= start of this month
                                task.completedDates = (task.completedDates || []).filter(d => d < cutoffStr);
                            }
                            await window.dbActions.updateTask(task);
                        } else {
                            // Show logging modal
                            renderLogModal(task.id);
                        }
                    }
                }
                return;
            }

            const deleteBtn = e.target.closest('[data-action="delete-task"]');
            if (deleteBtn && confirm("Are you sure you want to permanently delete this task?")) {
                await window.dbActions.deleteTask(deleteBtn.dataset.id);
                return;
            }

            const deleteUserBtn = e.target.closest('[data-action="delete-user"]');
            if (deleteUserBtn && confirm("Are you sure you want to permanently delete this user?")) {
                await window.dbActions.deleteUser(deleteUserBtn.dataset.id);
                return;
            }
        });

        // Initialize Application
        loadData();
    </script>
</body>
</html>
